<!DOCTYPE html>
<html>
<head>
    <title>Asset Library - Student Portal</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #1e293b; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #334155; }
        .card:hover { border-color: #38bdf8; transform: translateY(-2px); }
        .card img { width: 100%; border-radius: 5px; height: 100px; object-fit: cover; }
        h1 { font-size: 1.2rem; color: #94a3b8; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <h1>Shared Resource Assets</h1>
    <div class="grid">
        <a href="games/space-shooter/index.html" class="card">
            <img src="https://picsum.photos/200/100?random=1" alt="Asset">
            <p>Physics Engine v1</p>
        </a>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.location.href = 'https://classroom.google.com';
        });
    </script>
</body>
</html>
